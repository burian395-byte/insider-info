name: Insider scan

on:
  schedule:
    - cron: "20 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Spustit sken
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          LOOKBACK_DAYS: "7"
          WATCHLIST: ""
          MAX_FILINGS: "600"
        run: python scan.py

      - name: Skopirovat data pre dashboard
        run: cp data/latest.json docs/latest.json

      - name: Commitnut vysledok
        run: |
          git config user.name  "insider-radar"
          git config user.email "actions@github.com"
          git add data/latest.json docs/latest.json
          git diff --staged --quiet || git commit -m "sken $(date -u +%Y-%m-%d)"
          git push
